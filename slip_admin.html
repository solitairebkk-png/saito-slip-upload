<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スリップ管理 | サイトウフーズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb; --surface: #ffffff; --surface2: #f0f2f7; --border: #e2e6ef;
    --accent: #3b6ef5; --accent-dim: rgba(59,110,245,0.1);
    --warn: #e07c00; --warn-dim: rgba(224,124,0,0.1);
    --ok: #0a9e5c; --ok-dim: rgba(10,158,92,0.1);
    --teal: #0891b2; --teal-dim: rgba(8,145,178,0.1);
    --muted: #8492a6; --text: #1a2233; --text2: #4a5568;
    --red: #e03c3c; --red-dim: rgba(224,60,60,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 32px; height: 32px; background: var(--teal); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 15px; font-weight: 700; }
  .logo-sub { font-size: 11px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-updated { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .btn-fetch { background: var(--teal); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; font-family: 'Noto Sans JP', sans-serif; }
  .btn-fetch:hover { opacity: 0.85; } .btn-fetch:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats-bar { padding: 20px 32px; display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; min-width: 130px; }
  .stat-card.pending { border-left: 3px solid var(--red); }
  .stat-card.done { border-left: 3px solid var(--ok); }
  .stat-num { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
  .stat-card.pending .stat-num { color: var(--red); }
  .stat-card.done .stat-num { color: var(--ok); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .toolbar { padding: 0 32px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
  .filter-btn { padding: 6px 16px; border: none; background: transparent; color: var(--text2); border-radius: 7px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; }
  .filter-btn.active { background: var(--teal); color: #fff; }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 10px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; width: 240px; }
  .search-input:focus { border-color: var(--teal); }

  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 16px; color: var(--muted); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.done-row { background: #f0f7f0; }
  tbody td { padding: 14px 16px; vertical-align: middle; }

  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 800; white-space: nowrap; }
  .badge-pending { background: #ff3b30; color: #fff; }
  .badge-done { background: #007aff; color: #fff; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .sender-name { font-weight: 500; color: var(--text); }
  .lang-tag { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; text-transform: uppercase; }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); white-space: nowrap; }

  .slip-row { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .slip-amount { font-size: 14px; font-weight: 700; color: var(--teal); font-family: 'DM Mono', monospace; }
  .slip-sep { color: var(--muted); font-size: 11px; }
  .slip-date { font-size: 11px; color: var(--muted); }
  .slip-name { font-size: 12px; color: var(--text2); }
  .copy-btn { padding: 2px 8px; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--muted); font-size: 10px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .copy-btn:hover { border-color: var(--teal); color: var(--teal); }
  .read-btn { padding: 4px 10px; border: 1px solid var(--teal); border-radius: 6px; background: var(--teal-dim); color: var(--teal); font-size: 11px; font-weight: 600; cursor: pointer; }
  .read-btn:hover { background: var(--teal); color: #fff; }

  .att-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(8,145,178,0.25); border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 500; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto; transform: translateY(16px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .meta-item label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .meta-item span { font-size: 14px; font-weight: 500; }

  .slip-info-box { background: var(--teal-dim); border: 1px solid rgba(8,145,178,0.3); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .slip-inline { display: flex; align-items: center; gap: 8px; flex: 1; font-family: 'DM Mono', monospace; }
  .slip-inline .s-amount { font-size: 20px; font-weight: 700; color: var(--teal); }
  .slip-inline .s-sep { color: var(--muted); }
  .slip-inline .s-date { font-size: 13px; color: var(--text2); }
  .slip-inline .s-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .slip-copy-btn { padding: 6px 14px; border: 1px solid rgba(8,145,178,0.4); border-radius: 6px; background: transparent; color: var(--teal); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }
  .slip-copy-btn:hover { background: var(--teal); color: #fff; }

  .img-preview { width: 100%; border-radius: 10px; max-height: 360px; object-fit: contain; background: var(--bg); border: 1px solid var(--border); cursor: zoom-in; }

  .section-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .status-buttons { display: flex; gap: 8px; }
  .status-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; }
  .status-btn.active-pending { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .status-btn.active-done { background: var(--ok-dim); border-color: var(--ok); color: var(--ok); }
  .note-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; width: 100%; resize: vertical; min-height: 64px; }
  .save-btn { background: var(--teal); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; width: 100%; }
  .save-btn:hover { opacity: 0.85; }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; cursor: zoom-out; }
  .lightbox.show { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }

  .empty { text-align: center; padding: 64px 32px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  .spinner-teal { border: 2px solid rgba(8,145,178,0.3); border-top-color: var(--teal); }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ok); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 400; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💳</div>
    <div>
      <div class="logo-text">スリップ管理</div>
      <div class="logo-sub">サイトウフーズ Webアップロード</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">---</span>
    <button class="btn-fetch" id="fetchBtn" onclick="loadData()">
      <span id="fetchIcon">↻</span> 更新
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('未確認',this)">未確認</button>
    <button class="filter-btn" onclick="setFilter('確認済み',this)">確認済み</button>
  </div>
  <input type="text" class="search-input" placeholder="🔍 名前・金額で検索..." oninput="setSearch(this.value)">
</div>

<div class="table-wrap">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">📭</div>
    <div>スリップはまだありません</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalName"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="meta-grid">
        <div class="meta-item"><label>お名前</label><span id="mName"></span></div>
        <div class="meta-item"><label>受信日時</label><span id="mDate" style="font-family:'DM Mono',monospace;font-size:12px;"></span></div>
        <div class="meta-item"><label>言語</label><span id="mLang"></span></div>
        <div class="meta-item"><label>注文Ref</label><span id="mRef"></span></div>
      </div>

      <!-- Vision API読み取り結果 -->
      <div>
        <div class="section-label">💡 スリップ読み取り結果</div>
        <div class="slip-info-box" id="slipInfoBox">
          <div class="slip-inline">
            <span class="s-amount" id="sAmount">---</span>
            <span class="s-sep">|</span>
            <span class="s-date" id="sDate">---</span>
            <span class="s-sep">|</span>
            <span class="s-name" id="sName">---</span>
          </div>
          <button class="slip-copy-btn" onclick="copySlip()">📋 コピー</button>
        </div>
        <button class="read-btn" id="readBtn" style="margin-top:10px;width:100%;padding:10px;" onclick="readSlip()">
          <span id="readContent">🔍 Claude AIでスリップを読み取る</span>
        </button>
      </div>

      <!-- スリップ画像 -->
      <div>
        <div class="section-label">📎 スリップ画像</div>
        <img class="img-preview" id="slipImg" src="" onclick="openLightbox(this.src)" alt="">
      </div>

      <!-- ステータス -->
      <div>
        <div class="section-label">ステータス</div>
        <div class="status-buttons">
          <button class="status-btn" id="btn-pending" onclick="setModalStatus('未確認')">🔴 未確認</button>
          <button class="status-btn" id="btn-done" onclick="setModalStatus('確認済み')">🟢 確認済み</button>
        </div>
      </div>

      <!-- メモ -->
      <div>
        <div class="section-label">メモ</div>
        <textarea class="note-input" id="modalNote" placeholder="対応メモ..."></textarea>
      </div>

      <button class="save-btn" onclick="saveStatus()">保存</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== GAS URL =====
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw1QpEXf_9FFvoDrNbiPOeq3IvuBSC_Al6Js-TLhE1cnULJ_gf2VDPUG6U9LnX-6NCw/exec';
  // ===================

  let allData = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let currentSlip = null;
  let currentStatus = '';

  async function loadData() {
    const icon = document.getElementById('fetchIcon');
    icon.innerHTML = '<span class="spinner spinner-teal"></span>';
    try {
      const res = await fetch(GAS_URL + '?action=list');
      const json = await res.json();
      allData = json.data || [];
      updateStats();
      document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
      renderTable();
    } catch(e) {
      showToast('読み込みエラー', true);
    } finally {
      icon.textContent = '↻';
    }
  }

  function updateStats() {
    const pending = allData.filter(d => d.status === '未確認').length;
    const done = allData.filter(d => d.status === '確認済み').length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card pending"><div class="stat-num">${pending}</div><div class="stat-label">未確認</div></div>
      <div class="stat-card done"><div class="stat-num">${done}</div><div class="stat-label">確認済み</div></div>
    `;
    document.title = pending > 0 ? `(${pending}) スリップ管理` : 'スリップ管理';
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }
  function setSearch(v) { currentSearch = v.toLowerCase(); renderTable(); }

  function renderTable() {
    let data = allData;
    if (currentFilter !== 'all') data = data.filter(d => d.status === currentFilter);
    if (currentSearch) data = data.filter(d =>
      (d.name||'').toLowerCase().includes(currentSearch) ||
      (d.amount||'').toLowerCase().includes(currentSearch)
    );

    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    thead.innerHTML = `<tr><th>ステータス</th><th>お名前</th><th>読み取り結果</th><th>画像</th><th>受信日時</th></tr>`;

    if (!data.length) { tbody.innerHTML=''; empty.style.display=''; return; }
    empty.style.display = 'none';

    tbody.innerHTML = data.map(d => {
      const badge = d.status === '確認済み'
        ? `<span class="status-badge badge-done"><span class="dot"></span>確認済み</span>`
        : `<span class="status-badge badge-pending"><span class="dot"></span>未確認</span>`;
      const name = `<div class="sender-name">${esc(d.name)||'(不明)'}</div><div class="lang-tag">${d.lang||''}</div>`;
      const slip = d.amount
        ? `<div class="slip-row"><span class="slip-amount">${esc(d.amount)}</span><span class="slip-sep">|</span><span class="slip-name">${esc(d.slipName||'')}</span><button class="copy-btn" onclick="event.stopPropagation();copyText('${esc(d.amount)} | ${esc(d.slipDate||'')} | ${esc(d.slipName||'')}')">📋</button></div>`
        : `<span style="color:var(--muted);font-size:11px;">未読み取り</span>`;
      const img = `<span class="att-chip">📎 画像</span>`;
      return `<tr class="${d.status==='確認済み'?'done-row':''}" onclick="openModal(${d.row})">
        <td>${badge}</td><td>${name}</td><td>${slip}</td><td>${img}</td>
        <td class="date-cell">${esc(d.receivedAt)}</td></tr>`;
    }).join('');
  }

  function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

  function driveImageUrl(url) {
    // DriveのファイルURLを画像直接表示用に変換
    const m = (url||'').match(/[-\w]{25,}/);
    return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w800` : url;
  }

  function openModal(row) {
    const d = allData.find(x => x.row === row);
    if (!d) return;
    currentSlip = d;
    currentStatus = d.status;

    document.getElementById('modalName').textContent = d.name || '(不明)';
    document.getElementById('mName').textContent = d.name || '(不明)';
    document.getElementById('mDate').textContent = d.receivedAt || '';
    document.getElementById('mLang').textContent = d.lang || '-';
    document.getElementById('mRef').textContent = d.orderRef || '-';

    document.getElementById('sAmount').textContent = d.amount || '---';
    document.getElementById('sDate').textContent = d.slipDate || '---';
    document.getElementById('sName').textContent = d.slipName || '---';

    document.getElementById('slipImg').src = driveImageUrl(d.driveUrl);
    document.getElementById('modalNote').value = d.memo || '';

    updateStatusButtons(d.status);
    document.getElementById('modalOverlay').classList.add('show');
  }

  function setModalStatus(s) { currentStatus = s; updateStatusButtons(s); }
  function updateStatusButtons(s) {
    document.getElementById('btn-pending').className = 'status-btn' + (s==='未確認'?' active-pending':'');
    document.getElementById('btn-done').className = 'status-btn' + (s==='確認済み'?' active-done':'');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  async function readSlip() {
    if (!currentSlip) return;
    const btn = document.getElementById('readBtn');
    btn.disabled = true;
    document.getElementById('readContent').innerHTML = '<span class="spinner spinner-teal"></span> 読み取り中...';
    try {
      const res = await fetch(GAS_URL + '?action=readSlip&row=' + currentSlip.row);
      const json = await res.json();
      if (json.status === 'ok') {
        document.getElementById('sAmount').textContent = json.amount || '---';
        document.getElementById('sDate').textContent = json.date || '---';
        document.getElementById('sName').textContent = json.name || '---';
        currentSlip.amount = json.amount;
        currentSlip.slipDate = json.date;
        currentSlip.slipName = json.name;
        showToast('✨ 読み取り完了');
        renderTable();
      } else {
        showToast('読み取り失敗: ' + (json.message||''), true);
      }
    } catch(e) {
      showToast('読み取りエラー', true);
    } finally {
      btn.disabled = false;
      document.getElementById('readContent').textContent = '🔍 Claude AIでスリップを読み取る';
    }
  }

  function copySlip() {
    const a = document.getElementById('sAmount').textContent;
    const d = document.getElementById('sDate').textContent;
    const n = document.getElementById('sName').textContent;
    copyText(`${a} | ${d} | ${n}`);
  }
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました'));
  }

  async function saveStatus() {
    if (!currentSlip) return;
    const memo = document.getElementById('modalNote').value;
    try {
      await fetch(`${GAS_URL}?action=updateStatus&row=${currentSlip.row}&status=${encodeURIComponent(currentStatus)}&memo=${encodeURIComponent(memo)}`);
      showToast('保存しました');
      closeModal();
      loadData();
    } catch(e) {
      showToast('保存エラー', true);
    }
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError?' error':'');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
