<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip Management | Saito Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb; --surface: #ffffff; --surface2: #f0f2f7; --border: #e2e6ef;
    --accent: #3b6ef5; --accent-dim: rgba(59,110,245,0.1);
    --ok: #0a9e5c; --ok-dim: rgba(10,158,92,0.1);
    --teal: #0891b2; --teal-dim: rgba(8,145,178,0.1);
    --muted: #8492a6; --text: #1a2233; --text2: #4a5568;
    --red: #e03c3c; --red-dim: rgba(224,60,60,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 32px; height: 32px; background: var(--teal); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 15px; font-weight: 700; }
  .logo-sub { font-size: 11px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-updated { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .btn-refresh { background: var(--teal); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .btn-refresh:hover { opacity: 0.85; }

  .stats-bar { padding: 20px 32px; display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; min-width: 150px; }
  .stat-card.pending { border-left: 3px solid var(--red); }
  .stat-card.done { border-left: 3px solid var(--ok); }
  .stat-num { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
  .stat-card.pending .stat-num { color: var(--red); }
  .stat-card.done .stat-num { color: var(--ok); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .toolbar { padding: 0 32px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
  .filter-btn { padding: 6px 16px; border: none; background: transparent; color: var(--text2); border-radius: 7px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .filter-btn.active { background: var(--teal); color: #fff; }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 10px; font-size: 13px; outline: none; width: 260px; }
  .search-input:focus { border-color: var(--teal); }

  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 16px; color: var(--muted); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.done-row { background: #f0f7f0; }
  tbody td { padding: 12px 16px; vertical-align: middle; }

  /* インラインステータス切り替えボタン */
  .status-toggle { display: inline-flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .status-toggle-btn { padding: 5px 12px; border: none; background: transparent; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .status-toggle-btn.pending { color: var(--red); }
  .status-toggle-btn.pending.active { background: var(--red); color: #fff; }
  .status-toggle-btn.done { color: var(--ok); border-left: 1px solid var(--border); }
  .status-toggle-btn.done.active { background: var(--ok); color: #fff; }

  .sender-name { font-weight: 600; color: var(--text); font-size: 13px; }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); white-space: nowrap; }
  .slip-row { display: flex; align-items: center; gap: 8px; }
  .slip-amount { font-size: 14px; font-weight: 700; color: var(--teal); font-family: 'DM Mono', monospace; }
  .slip-sep { color: var(--muted); font-size: 11px; }
  .slip-name { font-size: 12px; color: var(--text2); }
  .copy-btn { padding: 2px 8px; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--muted); font-size: 10px; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { border-color: var(--teal); color: var(--teal); }
  .img-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(8,145,178,0.25); border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 500; cursor: pointer; }
  .img-chip:hover { background: var(--teal); color: #fff; }
  .read-btn { padding: 4px 10px; border: 1px solid var(--teal); border-radius: 6px; background: var(--teal-dim); color: var(--teal); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .read-btn:hover { background: var(--teal); color: #fff; }
  .read-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto; transform: translateY(16px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .meta-item label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .meta-item span { font-size: 14px; font-weight: 500; }
  .slip-info-box { background: var(--teal-dim); border: 1px solid rgba(8,145,178,0.3); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .slip-inline { display: flex; align-items: center; gap: 8px; flex: 1; font-family: 'DM Mono', monospace; }
  .slip-inline .s-amount { font-size: 20px; font-weight: 700; color: var(--teal); }
  .slip-inline .s-sep { color: var(--muted); }
  .slip-inline .s-date { font-size: 13px; color: var(--text2); }
  .slip-inline .s-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .slip-copy-btn { padding: 6px 14px; border: 1px solid rgba(8,145,178,0.4); border-radius: 6px; background: transparent; color: var(--teal); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .slip-copy-btn:hover { background: var(--teal); color: #fff; }
  .section-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .img-preview { width: 100%; border-radius: 10px; max-height: 360px; object-fit: contain; background: var(--bg); border: 1px solid var(--border); cursor: zoom-in; }
  .note-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; resize: vertical; min-height: 64px; font-family: inherit; }
  .save-btn { background: var(--teal); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
  .save-btn:hover { opacity: 0.85; }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; cursor: zoom-out; }
  .lightbox.show { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }

  .empty { text-align: center; padding: 64px 32px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  .spinner-teal { border: 2px solid rgba(8,145,178,0.3); border-top-color: var(--teal); }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ok); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 400; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💳</div>
    <div>
      <div class="logo-text">Slip Management / จัดการสลิป</div>
      <div class="logo-sub">Saito Foods — Web Upload</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">---</span>
    <button class="btn-refresh" id="fetchBtn" onclick="loadData()">
      <span id="fetchIcon">↻</span> Refresh / รีเฟรช
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('all',this)">All / ทั้งหมด</button>
    <button class="filter-btn" onclick="setFilter('未確認',this)">Unconfirmed / ยังไม่ยืนยัน</button>
    <button class="filter-btn" onclick="setFilter('確認済み',this)">Confirmed / ยืนยันแล้ว</button>
  </div>
  <input type="text" class="search-input" placeholder="🔍 Search name / amount...">
</div>

<div class="table-wrap">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">📭</div>
    <div>No slips yet / ยังไม่มีสลิป</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalName"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="meta-grid">
        <div class="meta-item"><label>Name / ชื่อ</label><span id="mName"></span></div>
        <div class="meta-item"><label>Received / รับเมื่อ</label><span id="mDate" style="font-family:'DM Mono',monospace;font-size:12px;"></span></div>
        <div class="meta-item"><label>Language / ภาษา</label><span id="mLang"></span></div>
        <div class="meta-item"><label>Order Ref</label><span id="mRef"></span></div>
      </div>

      <div>
        <div class="section-label">💡 Slip Data / ข้อมูลสลิป</div>
        <div class="slip-info-box">
          <div class="slip-inline">
            <span class="s-amount" id="sAmount">---</span>
            <span class="s-sep">|</span>
            <span class="s-date" id="sDate">---</span>
            <span class="s-sep">|</span>
            <span class="s-name" id="sName">---</span>
          </div>
          <button class="slip-copy-btn" onclick="copySlip()">📋 Copy</button>
        </div>
        <button class="read-btn" id="readBtn" style="margin-top:10px;width:100%;padding:10px;" onclick="readSlip()">
          <span id="readContent">🔍 Re-read with Claude AI / อ่านซ้ำด้วย Claude AI</span>
        </button>
      </div>

      <div>
        <div class="section-label">📎 Slip Image / รูปสลิป</div>
        <img class="img-preview" id="slipImg" src="" onclick="openLightbox(this.src)" alt="">
      </div>

      <div>
        <div class="section-label">Status / สถานะ</div>
        <div style="display:flex;gap:8px;">
          <button class="status-toggle-btn pending" id="modal-btn-pending" onclick="setModalStatus('未確認')" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);">
            🔴 Unconfirmed / ยังไม่ยืนยัน
          </button>
          <button class="status-toggle-btn done" id="modal-btn-done" onclick="setModalStatus('確認済み')" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);">
            🟢 Confirmed / ยืนยันแล้ว
          </button>
        </div>
      </div>

      <div>
        <div class="section-label">Note / หมายเหตุ</div>
        <textarea class="note-input" id="modalNote" placeholder="Note / หมายเหตุ..."></textarea>
      </div>

      <button class="save-btn" onclick="saveStatus()">Save / บันทึก</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw1QpEXf_9FFvoDrNbiPOeq3IvuBSC_Al6Js-TLhE1cnULJ_gf2VDPUG6U9LnX-6NCw/exec';

  let allData = [];
  let currentFilter = 'all';
  let currentSlip = null;
  let currentStatus = '';

  async function loadData() {
    const icon = document.getElementById('fetchIcon');
    icon.innerHTML = '<span class="spinner spinner-teal"></span>';
    try {
      const res = await fetch(GAS_URL + '?action=list');
      const json = await res.json();
      allData = json.data || [];
      updateStats();
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('en-GB');
      renderTable();
    } catch(e) {
      showToast('Load error', true);
    } finally {
      icon.textContent = '↻';
    }
  }

  function updateStats() {
    const pending = allData.filter(d => d.status === '未確認').length;
    const done = allData.filter(d => d.status === '確認済み').length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card pending">
        <div class="stat-num">${pending}</div>
        <div class="stat-label">Unconfirmed / ยังไม่ยืนยัน</div>
      </div>
      <div class="stat-card done">
        <div class="stat-num">${done}</div>
        <div class="stat-label">Confirmed / ยืนยันแล้ว</div>
      </div>
    `;
    document.title = pending > 0 ? `(${pending}) Slip Management` : 'Slip Management';
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  document.querySelector('.search-input').addEventListener('input', function() {
    renderTable(this.value.toLowerCase());
  });

  function renderTable(search = '') {
    let data = allData;
    if (currentFilter !== 'all') data = data.filter(d => d.status === currentFilter);
    if (search) data = data.filter(d =>
      (d.name||'').toLowerCase().includes(search) ||
      (d.amount||'').toLowerCase().includes(search)
    );

    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    thead.innerHTML = `<tr>
      <th>Status / สถานะ</th>
      <th>Name / ชื่อ</th>
      <th>Amount & Name / ยอดและชื่อ</th>
      <th>Image / รูป</th>
      <th>Received / รับเมื่อ</th>
    </tr>`;

    if (!data.length) { tbody.innerHTML=''; empty.style.display=''; return; }
    empty.style.display = 'none';

    tbody.innerHTML = data.map(d => {
      const isPending = d.status === '未確認';

      // インラインステータス切り替え
      const statusToggle = `
        <div class="status-toggle">
          <button class="status-toggle-btn pending ${isPending?'active':''}"
            onclick="event.stopPropagation();toggleStatus(${d.row},'未確認',this)"
            title="Unconfirmed">● Unconfirmed</button>
          <button class="status-toggle-btn done ${!isPending?'active':''}"
            onclick="event.stopPropagation();toggleStatus(${d.row},'確認済み',this)"
            title="Confirmed">● Confirmed</button>
        </div>`;

      const name = `<div class="sender-name">${esc(d.name)||'(unknown)'}</div>`;

      const slip = d.amount
        ? `<div class="slip-row">
             <span class="slip-amount">${esc(d.amount)}</span>
             <span class="slip-sep">|</span>
             <span class="slip-name">${esc(d.slipName||'')}</span>
             <button class="copy-btn" onclick="event.stopPropagation();copyText('${esc(d.amount)} | ${esc(d.slipDate||'')} | ${esc(d.slipName||'')}')">📋</button>
           </div>`
        : `<button class="read-btn" onclick="event.stopPropagation();quickRead(${d.row},this)">🔍 Read / อ่าน</button>`;

      const img = `<span class="img-chip" onclick="event.stopPropagation();previewImg('${esc(driveImageUrl(d.driveUrl))}')">📎 View</span>`;

      return `<tr class="${isPending?'':'done-row'}" onclick="openModal(${d.row})">
        <td>${statusToggle}</td>
        <td>${name}</td>
        <td>${slip}</td>
        <td>${img}</td>
        <td class="date-cell">${formatDate(d.receivedAt)}</td>
      </tr>`;
    }).join('');
  }

  // 一覧からワンクリックでステータス変更
  async function toggleStatus(row, newStatus, btn) {
    const tr = btn.closest('tr');
    try {
      await fetch(`${GAS_URL}?action=updateStatus&row=${row}&status=${encodeURIComponent(newStatus)}`);
      const d = allData.find(x => x.row === row);
      if (d) d.status = newStatus;
      // ボタンのアクティブ状態を即時更新
      const toggle = btn.closest('.status-toggle');
      toggle.querySelectorAll('.status-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tr.className = newStatus === '確認済み' ? 'done-row' : '';
      updateStats();
      showToast(newStatus === '確認済み' ? '✅ Confirmed / ยืนยันแล้ว' : '🔴 Unconfirmed / ยังไม่ยืนยัน');
    } catch(e) {
      showToast('Error', true);
    }
  }

  // 一覧から直接読み取り
  async function quickRead(row, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const res = await fetch(`${GAS_URL}?action=readSlip&row=${row}`);
      const json = await res.json();
      if (json.status === 'ok') {
        const d = allData.find(x => x.row === row);
        if (d) { d.amount = json.amount; d.slipDate = json.date; d.slipName = json.name; }
        renderTable(document.querySelector('.search-input').value.toLowerCase());
        showToast('✨ Read complete / อ่านสำเร็จ');
      } else {
        showToast('Read failed / อ่านไม่สำเร็จ', true);
        btn.disabled = false;
        btn.textContent = '🔍 Read / อ่าน';
      }
    } catch(e) {
      showToast('Error', true);
      btn.disabled = false;
      btn.textContent = '🔍 Read / อ่าน';
    }
  }

  function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

  function driveImageUrl(url) {
    const m = (url||'').match(/[-\w]{25,}/);
    return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w800` : url;
  }

  function formatDate(s) {
    if (!s) return '';
    try {
      const d = new Date(s);
      if (isNaN(d)) return s;
      return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    } catch { return s; }
  }

  function previewImg(src) {
    openLightbox(src);
  }

  function openModal(row) {
    const d = allData.find(x => x.row === row);
    if (!d) return;
    currentSlip = d;
    currentStatus = d.status;
    document.getElementById('modalName').textContent = d.name || '(unknown)';
    document.getElementById('mName').textContent = d.name || '(unknown)';
    document.getElementById('mDate').textContent = formatDate(d.receivedAt);
    document.getElementById('mLang').textContent = d.lang || '-';
    document.getElementById('mRef').textContent = d.orderRef || '-';
    document.getElementById('sAmount').textContent = d.amount || '---';
    document.getElementById('sDate').textContent = d.slipDate || '---';
    document.getElementById('sName').textContent = d.slipName || '---';
    document.getElementById('slipImg').src = driveImageUrl(d.driveUrl);
    document.getElementById('modalNote').value = d.memo || '';
    updateModalStatusButtons(d.status);
    document.getElementById('modalOverlay').classList.add('show');
  }

  function setModalStatus(s) { currentStatus = s; updateModalStatusButtons(s); }
  function updateModalStatusButtons(s) {
    const p = document.getElementById('modal-btn-pending');
    const d = document.getElementById('modal-btn-done');
    p.style.background = s==='未確認' ? 'var(--red)' : '';
    p.style.color = s==='未確認' ? '#fff' : '';
    d.style.background = s==='確認済み' ? 'var(--ok)' : '';
    d.style.color = s==='確認済み' ? '#fff' : '';
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  const overlay = document.getElementById('modalOverlay');
  overlay.addEventListener('mousedown', e => { if (e.target===overlay) overlay.dataset.close='1'; });
  overlay.addEventListener('mouseup', e => { if (e.target===overlay && overlay.dataset.close==='1') closeModal(); delete overlay.dataset.close; });

  async function readSlip() {
    if (!currentSlip) return;
    const btn = document.getElementById('readBtn');
    btn.disabled = true;
    document.getElementById('readContent').innerHTML = '<span class="spinner spinner-teal"></span> Reading...';
    try {
      const res = await fetch(`${GAS_URL}?action=readSlip&row=${currentSlip.row}`);
      const json = await res.json();
      if (json.status === 'ok') {
        document.getElementById('sAmount').textContent = json.amount || '---';
        document.getElementById('sDate').textContent = json.date || '---';
        document.getElementById('sName').textContent = json.name || '---';
        currentSlip.amount = json.amount;
        currentSlip.slipDate = json.date;
        currentSlip.slipName = json.name;
        showToast('✨ Read complete / อ่านสำเร็จ');
        renderTable(document.querySelector('.search-input').value.toLowerCase());
      } else {
        showToast('Read failed / อ่านไม่สำเร็จ', true);
      }
    } catch(e) {
      showToast('Error', true);
    } finally {
      btn.disabled = false;
      document.getElementById('readContent').textContent = '🔍 Re-read with Claude AI / อ่านซ้ำด้วย Claude AI';
    }
  }

  function copySlip() {
    copyText(`${document.getElementById('sAmount').textContent} | ${document.getElementById('sDate').textContent} | ${document.getElementById('sName').textContent}`);
  }
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied / คัดลอกแล้ว'));
  }

  async function saveStatus() {
    if (!currentSlip) return;
    const memo = document.getElementById('modalNote').value;
    try {
      await fetch(`${GAS_URL}?action=updateStatus&row=${currentSlip.row}&status=${encodeURIComponent(currentStatus)}&memo=${encodeURIComponent(memo)}`);
      currentSlip.status = currentStatus;
      currentSlip.memo = memo;
      showToast('Saved / บันทึกแล้ว');
      closeModal();
      updateStats();
      renderTable(document.querySelector('.search-input').value.toLowerCase());
    } catch(e) {
      showToast('Save error', true);
    }
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError?' error':'');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
